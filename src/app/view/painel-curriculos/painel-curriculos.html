<div class="container">
  <h2>Gerenciar Currículos</h2>

  <form (ngSubmit)="salvarCurriculo()">

    <div class="form-group">
      <label>Título</label>
      <input
        type="text"
        [(ngModel)]="curriculo.titulo"
        name="titulo"
        placeholder="Título do currículo">
    </div>

    <div class="form-group">
      <label>Formação</label>
      <input
        type="text"
        [(ngModel)]="curriculo.formacao"
        name="formacao"
        placeholder="Formação acadêmica">
    </div>

    <div class="form-group">
      <label>Experiência</label>
      <input
        type="text"
        [(ngModel)]="curriculo.experiencia"
        name="experiencia"
        placeholder="Experiência profissional">
    </div>

    <div class="form-group">
      <label>Habilidades</label>
      <input
        type="text"
        [(ngModel)]="curriculo.habilidades"
        name="habilidades"
        placeholder="Habilidades">
    </div>

    <div class="form-group">
      <label>LinkedIn</label>
      <input
        type="text"
        [(ngModel)]="curriculo.linkedin"
        name="linkedin"
        placeholder="LinkedIn">
    </div>

    <div class="botoes">
      <button type="submit" class="salvar">
        Salvar Currículo
      </button>

      <button
        type="button"
        class="novo"
        (click)="limparFormulario()">
        Novo
      </button>
    </div>

  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Formação</th>
        <th>Habilidades</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      @for (item of curriculos; track item.id) {
        <tr>
          <td>{{ item.id }}</td>
          <td>{{ item.titulo }}</td>
          <td>{{ item.formacao }}</td>
          <td>{{ item.habilidades }}</td>
          <td class="acoes">
            <button
              type="button"
              class="editar"
              (click)="selecionarCurriculo(item)">
              Editar
            </button>

            <button
              type="button"
              class="excluir"
              (click)="deletarCurriculo(item.id)">
              Excluir
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
